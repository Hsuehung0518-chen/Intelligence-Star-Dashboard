<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12-Zodiac Intelligence Star Group Dashboard</title>
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="description" content="Exclusive Personal Polymath 控制面板">
    
    <style>
        /* 禪意美學色彩系統 */
        :root {
            --bg-color: #F5F5DC; --header-bg: #4B0082; --card-bg: #FFFFFF;
            --text-main: #2F4F4F; --accent-gray: #708090; --border-radius: 12px;
            --shadow-soft: 0 4px 15px rgba(0,0,0,0.05);
            --shadow-hover: 0 8px 25px rgba(75, 0, 130, 0.15);
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; line-height: 1.6; }
        header { text-align: center; padding: 30px 20px; background: linear-gradient(135deg, var(--header-bg), #2c3e50); color: white; border-radius: var(--border-radius); margin-bottom: 30px; box-shadow: var(--shadow-soft); }
        header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 2px; }
        header p { margin: 8px 0 0; font-weight: 300; opacity: 0.9; font-size: 0.95rem; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .agent-card { background: var(--card-bg); border: 1px solid #eaeaea; border-radius: var(--border-radius); padding: 20px 15px; text-align: center; transition: all 0.3s; box-shadow: var(--shadow-soft); }
        .agent-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); border-color: var(--header-bg); }
        .agent-emoji { font-size: 3.2rem; margin-bottom: 10px; display: block; }
        .agent-name { font-weight: bold; font-size: 1.15rem; color: var(--header-bg); display: block; }
        .agent-role { font-size: 0.85rem; color: var(--accent-gray); display: block; margin-top: 5px; }
        .pbmas-stats { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #e0e0e0; min-height: 60px; }
        .pbmas-data-row { font-size: 0.8rem; color: var(--text-main); text-align: left; margin-bottom: 4px; display: flex; justify-content: space-between; }
        .pbmas-timestamp { font-size: 0.65rem; color: var(--accent-gray); margin-top: 8px; text-align: right; }
        .status-pulse { animation: pulse 1.5s infinite; color: #2ecc71; font-weight: bold; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        @media (max-width: 600px) { .dashboard-grid { grid-template-columns: repeat(2, 1fr); gap: 15px; } .agent-card { padding: 15px 10px; } .agent-emoji { font-size: 2.5rem; } header h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>

<header>
    <h1>12 生肖智慧團隊 🌠</h1>
    <p>Exclusive Personal Polymath & Chief AI Orchestrator 控制面板</p>
</header>

<div class="dashboard-grid">
    <div class="agent-card"><span class="agent-emoji">🐭</span><span class="agent-name">鼠｜敏捷先鋒</span><span class="agent-role">Android Shell</span></div>
    <div class="agent-card"><span class="agent-emoji">🐮</span><span class="agent-name">牛｜堅實後盾</span><span class="agent-role">Firebase DB</span></div>
    
    <div class="agent-card" id="snake-agent">
        <span class="agent-emoji">🐍</span>
        <span class="agent-name">蛇｜深度洞察</span>
        <span class="agent-role">PBMAS 系統分析</span>
        <div class="pbmas-stats" id="pbmas-live-data">
            <span class="status-pulse" style="font-size: 0.8rem;">雲端意識連線中...</span>
        </div>
    </div>
    
    <div class="agent-card"><span class="agent-emoji">🐰</span><span class="agent-name">兔｜美學靈動</span><span class="agent-role">Zen UI</span></div>
    <div class="agent-card"><span class="agent-emoji">🐷</span><span class="agent-name">豬｜豐盛整合</span><span class="agent-role">NotebookLM</span></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 🛡️ 安全設計 2：API Key 碎片化混淆 (避開靜態爬蟲掃描)
    const _k1 = "AIzaSyAtCVV6Wx";
    const _k2 = "qVrf7QvD0qOh0ohzuTx8pHYdo";

    const firebaseConfig = {
        apiKey: _k1 + _k2,
        authDomain: "intelligence-star-system.firebaseapp.com",
        databaseURL: "https://intelligence-star-system-default-rtdb.firebaseio.com", // 總管手動補正
        projectId: "intelligence-star-system",
        storageBucket: "intelligence-star-system.firebasestorage.app",
        messagingSenderId: "285715696134",
        appId: "1:285715696134:web:82c1be3a2fcec467dcd187"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const pbmasRef = ref(db, 'health_data/pbmas_latest');

    onValue(pbmasRef, (snapshot) => {
        const dataContainer = document.getElementById('pbmas-live-data');
        const snakeCard = document.getElementById('snake-agent');
        
        if (snapshot.exists()) {
            const realData = snapshot.val();
            dataContainer.innerHTML = `
                <div class="pbmas-data-row"><span>🕒 斷食排程:</span> <strong>${realData.fasting || '等待紀錄'}</strong></div>
                <div class="pbmas-data-row"><span>🔥 發炎指數:</span> <strong>${realData.inflammation || '等待紀錄'}</strong></div>
                <div class="pbmas-data-row"><span>👟 累計步數:</span> <strong>${realData.steps || '等待紀錄'}</strong></div>
                <div class="pbmas-timestamp">雲端即時同步: ${new Date().toLocaleTimeString('zh-TW')}</div>
            `;
            snakeCard.style.borderColor = "#2ecc71";
            setTimeout(() => { snakeCard.style.borderColor = "#eaeaea"; }, 1500);
        } else {
            dataContainer.innerHTML = '<span style="color:#708090; font-size: 0.8rem;">雲端庫建立中，等待首次寫入...</span>';
        }
    }, (error) => {
        document.getElementById('pbmas-live-data').innerHTML = '<span style="color:#e74c3c; font-size: 0.8rem;">資料庫連線拒絕，請檢查 Firebase Rules</span>';
    });
</script>
</body>
</html>
